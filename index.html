<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
    <title>Unity WebGL Player | My project (12)</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    
    <style>
      /* 魹ｽ魹ｽﾃｼ ﾈｭ魹ｽ魹ｽ 魹ｽﾟｾﾓｿ魹ｽ 魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ 魹ｽ魹ｽ魹ｽ魹ｽ 魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ 魹ｽ魹ｽ魹ｽﾚｸ魹ｽ 魹ｽ魹ｽ魹ｽ魹ｽﾏｴ魹ｽ */
      html, body {
        background-color: #f5f5f5; /* 魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ 魹ｽ魹ｽﾅｸ魹ｽ魹ｽ 魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ 魹ｽ魹ｽ魹ｽ魹ｽ */
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #unity-container {
        width: 360px !important;  /* 魹ｽﾏｹ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ 魹ｽ魹ｽ魹ｽ魹ｽﾆｮ魹ｽ魹ｽ 魹ｽ魹ｽ魹ｽ魹ｽ ﾅｩ魹ｽ魹ｽ 魹ｽ魹ｽ魹ｽ魹ｽ */
        height: 740px !important; /* 魹ｽﾏｹ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ 魹ｽ魹ｽ魹ｽ魹ｽﾆｮ魹ｽ魹ｽ 魹ｽ魹ｽ魹ｽ魹ｽ ﾅｩ魹ｽ魹ｽ 魹ｽ魹ｽ魹ｽ魹ｽ */
        position: relative;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1); /* 魹ｽ魹ｽ魹ｽﾃｵ魹ｽ 魹ｽﾗｸ魹ｽ魹ｽ魹ｽ ﾈｿ魹ｽ魹ｽ */
        background: #fff;
        overflow: hidden;
      }
      #unity-canvas {
        width: 100% !important;
        height: 100% !important;
      }
      /* 魹ｽ魹ｽ魹ｽﾃ｢魹ｽ魹ｽ 魹ｽ魹ｽ 魹ｽﾌｻ魹ｽ 魹ｽﾊｿ魹ｽ 魹ｽ魹ｽ魹ｽ魹ｽ魹ｽﾇｷ魹ｽ 魹ｽ魹ｽ魹ｽ魹ｽ */
      #unity-mobile-warning {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas"></canvas>
      
      <div id="unity-loading-bar" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); text-align:center;">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty" style="width:200px; height:10px; background:#eee; border-radius:5px; margin-top:10px;">
          <div id="unity-progress-bar-full" style="width:0%; height:100%; background:#ff5a5a; border-radius:5px; transition: width 0.2s;"></div>
        </div>
      </div>

      <div id="unity-footer" style="display:none;">
        <div id="unity-fullscreen-button"></div>
      </div>
    </div>

    <script>
      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/RoomTherapy_Build.loader.js";
      var config = {
        dataUrl: buildUrl + "/RoomTherapy_Build.data",
        frameworkUrl: buildUrl + "/RoomTherapy_Build.framework.js",
        codeUrl: buildUrl + "/RoomTherapy_Build.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "My project (12)",
        productVersion: "1.0",
      };

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var fullscreenButton = document.querySelector("#unity-fullscreen-button");

      // 魹ｽ魹ｽ魹ｽ 魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ 魹ｽﾎｵ蟾ｯ魹ｽ魹ｽ 魹ｽﾘｻ朁ｵｸ魹ｽ 魹ｽ魹ｽ魹ｽ魹ｽ 魹ｽﾈｼ魹ｽ 魹ｽ魹ｽﾄｪ 魹ｽ魹ｽ魹ｽ魹ｽ
      config.devicePixelRatio = window.devicePixelRatio || 1;

      // [魹ｽﾙｽ魹ｽ 魹ｽ魹ｽﾄ｣ 魹ｽﾎｺ魹ｽ] 魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ 魹ｽ魹ｽ魹ｽ ﾃｼﾅｩ 魹ｽ魹ｽ 魹ｽ魹ｽ魹ｽ魹ｽ 魹ｽ魹ｽ魹ｽ魹ｽ魹ｽﾏｴ魹ｽ 魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ 魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ 魹ｽ魹ｽ魹ｽ魹ｽ魹ｽﾟｽ魹ｽ魹ｽﾏｴ魹ｽ.
      // 魹ｽ魹ｽ魹ｽ魹ｽ PC 魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ 魹ｽ魹ｽ魹ｽ 魹ｽ魹ｽ魹ｽ魹ｽﾆｮ魹ｽ魹ｽ魹ｽﾌｵ魹ｽ 魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ 魹ｽﾎｵ魹ｽ 魹ｽﾙｸ魹ｽ 魹ｽ魹ｽ魹ｽ魹ｽ 魹ｽ魹ｽ魹ｽ魹ｽ魹ｽﾕｴﾏｴ魹ｽ.

      loadingBar.style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          if(progressBarFull) progressBarFull.style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          if(loadingBar) loadingBar.style.display = "none";
          fullscreenButton.onclick = () => {
            unityInstance.SetFullscreen(1);
          };
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
